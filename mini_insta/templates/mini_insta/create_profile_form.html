<!-- Discription: Template for creating both a Django User and a Profile -->

{% extends "mini_insta/base.html" %}

{% block content %}
<article class="form-card">
  <h2>Create Profile</h2>

  <form action="{% url 'create_profile' %}" method="POST">
    {% csrf_token %}

    <h3>Account</h3>
    <table>
      {{ user_form.as_table }}
    </table>

    <h3>Profile</h3>
    <table>
      {{ form.as_table }}
    </table>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Profile</button>
      <a href="{% url 'show_all_profiles' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}
