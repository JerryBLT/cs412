<!-- Discription: Template for login page-->

{% extends 'mini_insta/base.html' %}

{% block content %}
<h1>Login to Mini Insta</h1>
<form action="{% url 'login' %}" method="POST">
    {% csrf_token %}
    {{ form }}
    <input type="submit" value="Login">
    {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
    {% else %}
        <input type="hidden" name="next" value="{% url 'show_all_profiles' %}">
    {% endif %}
</form>

<p>Don't have an account? <a href="{% url 'create_profile' %}">Create one here</a>.</p>
{% endblock %}
